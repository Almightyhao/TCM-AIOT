<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中西藥交互作用知識庫整併工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans p-8">

    <div class="max-w-3xl mx-auto bg-white p-8 rounded-lg shadow-md">
        <h1 class="text-2xl font-bold mb-6 text-blue-700">中西藥交互作用 CSV 自動整併工具</h1>
        
        <p class="mb-6 text-sm text-gray-600">
            請依序上傳「現有知識條目 (V4 檔)」與「欲新增的文獻 (Reference)」。<br>
            系統內建<b>強制格式統一過濾器</b>，保證所有文獻接以單一連字號開頭，並過濾掉無意義的空泛文獻種類。
        </p>

        <div class="space-y-4 mb-8">
            <div class="p-4 border border-gray-200 rounded">
                <label class="block font-semibold mb-2">1. 選擇現有知識條目 (V4 CSV 檔):</label>
                <input type="file" id="v4File" accept=".csv" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
            </div>

            <div class="p-4 border border-gray-200 rounded">
                <label class="block font-semibold mb-2">2. 選擇欲新增文獻 (Reference CSV 檔):</label>
                <input type="file" id="refFile" accept=".csv" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-sm file:font-semibold file:bg-green-50 file:text-green-700 hover:file:bg-green-100">
            </div>
        </div>

        <button id="processBtn" class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded hover:bg-blue-700 transition disabled:bg-gray-400">
            開始整併並下載新檔案
        </button>

        <div id="logArea" class="mt-6 p-4 bg-gray-100 rounded text-sm text-gray-700 h-48 overflow-y-auto whitespace-pre-wrap font-mono hidden"></div>
    </div>

    <script>
        const processBtn = document.getElementById('processBtn');
        const logArea = document.getElementById('logArea');

        function log(msg) {
            logArea.classList.remove('hidden');
            logArea.textContent += msg + '\n';
            logArea.scrollTop = logArea.scrollHeight;
        }

        function readFileAsText(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = e => resolve(e.target.result);
                reader.onerror = e => reject(e);
                reader.readAsText(file);
            });
        }

        // ==========================================
        // 【強制格式統一過濾器與去重引擎】
        // ==========================================
        function mergeAndDeduplicateRefs(existingText, newRef) {
            let rawText = (existingText || '') + '\n' + (newRef || '');
            rawText = rawText.replace(/健\s*保\s*資\s*料\s*庫\s*分\s*析/g, "健保資料庫分析");

            let lines = rawText.split(/\r?\n/).map(s => s.trim()).filter(s => s !== '');
            let repaired = [];
            
            for (let line of lines) {
                if (line === '-' || line === '') continue;

                if (line.endsWith('-')) {
                    line = line.slice(0, -1).trim();
                }

                if (line.startsWith('[')) {
                    repaired.push('- ' + line);
                } else if (line.startsWith('-')) {
                    repaired.push(line.replace(/^-+\s*/, '- '));
                } else {
                    if (repaired.length > 0) {
                        repaired[repaired.length - 1] += line;
                    } else {
                        repaired.push('- ' + line);
                    }
                }
            }
            
            let finalRefs = repaired.map(line => {
                let cl = line.trim();
                if (cl.endsWith('-')) cl = cl.slice(0, -1).trim();
                return cl;
            }).filter(line => line !== '-');
            
            let uniqueRefs = [...new Set(finalRefs)];
            return uniqueRefs.join('\n');
        }

        processBtn.addEventListener('click', async () => {
            const v4Input = document.getElementById('v4File');
            const refInput = document.getElementById('refFile');

            if (!v4Input.files[0] || !refInput.files[0]) {
                alert("請確保兩個 CSV 檔案都已上傳！");
                return;
            }

            logArea.textContent = ''; 
            processBtn.disabled = true;
            processBtn.textContent = '處理中...';

            try {
                log("讀取檔案中...");
                const v4Raw = await readFileAsText(v4Input.files[0]);
                const refRaw = await readFileAsText(refInput.files[0]);

                const v4Parsed = Papa.parse(v4Raw, { header: false, skipEmptyLines: true });
                let v4Data = v4Parsed.data;

                const refParsed = Papa.parse(refRaw, { header: true, skipEmptyLines: true });
                const refData = refParsed.data;

                let addedCount = 0;
                let newHerbCount = 0;
                let skippedCount = 0;

                log(`成功讀取 V4 共有 ${v4Data.length} 行資料`);
                log(`成功讀取 Reference 共有 ${refData.length} 筆資料\n---`);

                for (let row of refData) {
                    const herbName = (row['HERBNAME'] || '').replace(/[\r\n]+/g, "").trim();
                    const drugName = (row['DRUGNAME'] || '').replace(/[\r\n]+/g, "").trim();
                    const abstract = (row['IABSTRACT'] || '').replace(/[\r\n]+/g, "").trim();
                    const mngText = (row['MNGTEXT'] || '').replace(/[\r\n]+/g, "").trim();
                    let research = (row['RESEARCH'] || '').replace(/[\r\n]+/g, "").trim();
                    research = research.replace(/健\s*保\s*資\s*料\s*庫\s*分\s*析/g, "健保資料庫分析");
                    let reference = (row['REFERENCE'] || '').trim();

                    if (!herbName || !drugName) continue;

                    const targetTitle = `${herbName}的中西藥藥物交互作用(drug-drug) interaction, DDI)說明`;
                    
                    let explanationParts = [];
                    if (abstract) explanationParts.push(abstract);
                    if (mngText) explanationParts.push(`處置建議為${mngText}`);
                    const combinedExplanation = explanationParts.length > 0 ? explanationParts.join('，') : '無詳細說明';

                    let finalRefEntry = "";
                    let cleanRef = reference ? reference.replace(/[\r\n]+/g, " ").trim() : "";

                    // ==========================================
                    // 【精準過濾】：處理缺少實際文獻的情況
                    // ==========================================
                    if (!cleanRef || cleanRef.includes("#VALUE!") || cleanRef.includes("#NAME?")) {
                        // 如果沒有文獻，且 Research 是「健保資料庫分析」才顯示。
                        // 如果是「文獻回顧」等空泛詞彙，直接忽略留空！
                        if (research && research.includes("健保資料庫分析")) {
                            finalRefEntry = "- " + research;
                        } else {
                            finalRefEntry = ""; // 故意留空，不產生多餘的項目
                        }
                    } else if (cleanRef.includes("三軍總醫院")) {
                        finalRefEntry = "- 三軍總醫院臨床藥學部";
                    } else if (cleanRef.includes("中西藥併用諮詢") || cleanRef.includes("cmdhi")) {
                        finalRefEntry = "- [中西藥併用諮詢資料庫](https://www.cmdhi.mohw.gov.tw/)";
                    } else if (cleanRef.includes("奇美")) {
                        finalRefEntry = "- [奇美藥劑部中西藥交互作用查詢系統](https://www.chimei.org.tw/main/cmh_department/55500/DIS/cdi_search.asp)";
                    } else if (cleanRef.includes("高雄醫學") || cleanRef.includes("高醫")) {
                        finalRefEntry = "- [高雄醫學大學附設中和紀念醫院](https://www.kmuh.org.tw/www/pharmacy/inc/files/ChineseMedInteration.pdf)";
                    } else if (cleanRef.includes("中國醫藥") || cleanRef.includes("dhi.cmu")) {
                        finalRefEntry = "- [中國醫藥大學中西藥交互作用資訊網](https://dhi.cmu.edu.tw/query/)";
                    } else {
                        if (!cleanRef.startsWith('-')) cleanRef = '- ' + cleanRef;
                        if (research) {
                            if (cleanRef.endsWith(')')) {
                                cleanRef = cleanRef.slice(0, -1) + `/${research})`;
                            } else {
                                cleanRef += ` (${research})`;
                            }
                        }
                        finalRefEntry = cleanRef;
                    }

                    let matchIndex = v4Data.findIndex(vRow => vRow[0] && vRow[0].trim() === targetTitle);

                    if (matchIndex !== -1) {
                        let currentContent = v4Data[matchIndex][1] || '';
                        let currentCCol = v4Data[matchIndex][2] || '';

                        // 判斷是否重複
                        if (currentContent.toLowerCase().includes(drugName.toLowerCase())) {
                            skippedCount++;
                            continue;
                        }

                        // 自動標號
                        let nextNum = 1;
                        const numRegex = /^(\d+)\./gm;
                        let match;
                        while ((match = numRegex.exec(currentContent)) !== null) {
                            let num = parseInt(match[1]);
                            if (num >= nextNum) nextNum = num + 1;
                        }

                        const newContentEntry = `\n${nextNum}. ${drugName}；交互說明:${combinedExplanation}`;
                        v4Data[matchIndex][1] = currentContent + newContentEntry;

                        // 只有當 finalRefEntry 不是空的，才送進去處理
                        if (finalRefEntry !== "") {
                            v4Data[matchIndex][2] = mergeAndDeduplicateRefs(currentCCol, finalRefEntry);
                        } else {
                            // 即使沒有新文獻，也順便用過濾器把舊的亂碼修復整理一下
                            v4Data[matchIndex][2] = mergeAndDeduplicateRefs(currentCCol, "");
                        }
                        
                        addedCount++;

                    } else {
                        const newContentBase = `中西藥交互作用說明\n中藥名稱：${herbName}\n1. ${drugName}；交互說明:${combinedExplanation}`;
                        
                        // 建立全新中藥，如果 finalRefEntry 為空，這格就會是空的
                        let newRow = [targetTitle, newContentBase, finalRefEntry ? mergeAndDeduplicateRefs("", finalRefEntry) : ""];
                        if (v4Data[0] && v4Data[0].length > 3) {
                            for (let i = 3; i < v4Data[0].length; i++) newRow.push('');
                        }
                        
                        v4Data.push(newRow);
                        newHerbCount++;
                        addedCount++;
                        log(`[新增條目] 建立全新中藥：${herbName}`);
                    }
                }

                log(`---\n整併完成！`);
                log(`- 成功新增 ${addedCount} 筆交互作用`);
                log(`- 其中包含 ${newHerbCount} 個全新中藥條目`);
                log(`- 略過重複西藥 ${skippedCount} 筆`);

                const csvOutput = Papa.unparse(v4Data);
                const blob = new Blob(["\uFEFF" + csvOutput], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `中西藥交互_V4_Updated_${new Date().toISOString().slice(0,10)}.csv`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

            } catch (err) {
                console.error(err);
                alert("處理過程中發生錯誤，請檢查檔案格式是否正確。");
            } finally {
                processBtn.disabled = false;
                processBtn.textContent = '開始整併並下載新檔案';
            }
        });
    </script>
</body>
</html>
